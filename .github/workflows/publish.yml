name: Upload Python Package

on:
    release:
        types: [created]

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v4

            -   uses: astral-sh/setup-uv@v5
                with:
                    python-version: '3.13'

            -   name: Build and publish
                env:
                    UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
                run: |
                    uv build
                    uv publish
